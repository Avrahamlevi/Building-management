const CLOUDINARY_CLOUD = "db9yvfsfj";
const CLOUDINARY_PRESET = "ml_default";

async function uploadToCloudinary(file, onProgress){
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLOUDINARY_PRESET);
  const xhr = new XMLHttpRequest();
  xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`);
  return new Promise((resolve, reject)=>{
    xhr.upload.onprogress = e => { if(onProgress && e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => {
      const res = JSON.parse(xhr.responseText);
      if(res.secure_url) resolve({url: res.secure_url, name: file.name, type: file.type});
      else reject(new Error("העלאה נכשלה"));
    };
    xhr.onerror = () => reject(new Error("שגיאת רשת"));
    xhr.send(formData);
  });
}

async function dbFetch(path, opts={}){
  try{
    const res = await fetch(path, opts);
    if(!res.ok) throw new Error(res.statusText||'רשת לא זמינה');
    return await res.json();
  }catch(e){
    throw e;
  }
}
async function dbGet(){ return dbFetch(`${DB_BASE}/${KEY}.json`, {cache:'no-store'}); }
async function dbPut(data){ return dbFetch(`${DB_BASE}/${KEY}.json`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }

async function hashPassword(value){
  const encoder = new TextEncoder();
  const data = encoder.encode(value);
  if(typeof crypto==='object' && crypto.subtle && typeof crypto.subtle.digest==='function'){
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  return Array.from(data).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword(value){
  const stored = localStorage.getItem(PWD_KEY);
  if(!stored) return value === "1977";
  if(/^[0-9a-f]{64}$/.test(stored)) return await hashPassword(value)===stored;
  return value===stored;
}

// ── סיסמה ──
function getPassword(){ const stored = localStorage.getItem(PWD_KEY); return stored && !/^[0-9a-f]{64}$/.test(stored) ? stored : "1977"; }

function showLoginScreen(){
  const screen=document.createElement("div");
  screen.className="login-screen";
  screen.id="login-screen";
  screen.innerHTML=`
    <div class="login-box">
      <h2>🏢 ניהול בניין</h2>
      <p>הכנס סיסמה כדי להיכנס</p>
      <input type="password" id="pwd-inp" placeholder="••••" autocomplete="off"/>
      <div class="login-err" id="login-err"></div>
      <button class="btn blue" style="width:100%;padding:10px" onclick="tryLogin()">כניסה</button>
    </div>`;
  document.body.appendChild(screen);
  document.getElementById("pwd-inp").focus();
  document.getElementById("pwd-inp").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
}

window.tryLogin=async function(){
  const errEl=document.getElementById("login-err");
  const input=document.getElementById("pwd-inp");
  if(isAuthLocked()){
    const remaining = Math.ceil((lockUntil-Date.now())/1000);
    errEl.textContent = `🔒 נעול זמנית, נסה שוב בעוד ${remaining} שניות`;
    return;
  }
  const val = input.value;
  if(await checkPassword(val)){
    resetAuthFailures();
    sessionStorage.setItem("auth","ok");
    document.getElementById("login-screen").remove();
    render();
  } else {
    loginFailures++;
    if(loginFailures>=MAX_LOGIN_FAILURES){
      lockAuth();
      errEl.textContent = `🔒 סיסמה שגויה מספר פעמים. נסה שוב בעוד ${LOCK_DURATION/1000} שניות`;
    } else {
      errEl.textContent = `❌ סיסמה שגויה, נסה שוב (${loginFailures}/${MAX_LOGIN_FAILURES})`;
    }
    input.value="";
    input.focus();
  }
};

const daysBetween=(a,b)=>Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));
const monthsBetween=(a,b)=>{const d1=new Date(a),d2=new Date(b);return Math.max(0,(d2.getFullYear()-d1.getFullYear())*12+d2.getMonth()-d1.getMonth());};
const today=()=>new Date().toISOString().slice(0,10);

const calcOcc=(a,from,to)=>{
  const tot=daysBetween(from,to);if(!tot)return 0;
  let occ=0;
  for(const t of(a.tenants||[])){
    if(!t.startDate)continue;
    const end=t.endDate||to;
    const s=t.startDate>from?t.startDate:from,e=end<to?end:to;
    if(s<e)occ+=daysBetween(s,e);
  }
  return Math.min(100,Math.round(occ/tot*100));
};

// יצירת אלמנט בטוחה - מסנן null/undefined/""
function mk(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs) for(const[k,v]of Object.entries(attrs)){
    if(v==null)continue;
    if(k==="cls")e.className=v;
    else if(k==="html"){e.innerHTML=v;continue;}
    else if(k==="txt"){e.textContent=v;continue;}
    else if(k.startsWith("on"))e[k]=v;
    else e.setAttribute(k,v);
  }
  if(children)(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false||c===undefined||c==="")return;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node)e.appendChild(c);
  });
  return e;
}
const D=(cls,ch)=>mk("div",{cls},ch);
const Sp=(cls,txt)=>mk("span",{cls,txt});
const Bdg=(cls,txt)=>mk("span",{cls:"bdg "+cls,txt});
const Btn=(cls,txt,fn)=>mk("button",{cls:"btn "+cls,txt,onclick:fn});
const Lbl=t=>mk("label",{cls:"lbl",txt:t});
function Inp(type,val,fn,ph){
  const e=mk("input",{type,placeholder:ph||""});
  e.value=val||"";e.oninput=ev=>fn(ev.target.value);return e;
}
function Sel(opts,val,fn){
  const e=document.createElement("select");
  opts.forEach(([v,t])=>{
    const o=mk("option",{value:String(v),txt:t});
    if(String(v)===String(val))o.selected=true;
    e.appendChild(o);
  });
  e.onchange=ev=>fn(ev.target.value);return e;
}
function Col(l,c){return D("col",[Lbl(l),c]);}
function Ta(val,fn,ph){const e=mk("textarea",{placeholder:ph||""});e.value=val||"";e.oninput=ev=>fn(ev.target.value);return e;}

  const fields=[["שם מלא","name","text"],["טלפון","phone","tel"],["אימייל","email","email"],
   ["תעודת זהות","idNum","text"],["תאריך כניסה","startDate","date"],
   ["תאריך יציאה","endDate","date"],['שכ"ד ₪',"rent","number"],
   ["ועד בית ₪","vaad","number"],["פיקדון ₪","deposit","number"]];
  fields.forEach(([l,k,t])=>{
    const inp=mk("input",{type:t,placeholder:""});
    inp.value=d[k]||"";
    inp.oninput=ev=>{d[k]=ev.target.value;};
    g.appendChild(Col(l,inp));
  });
  wrap.appendChild(g);
  wrap.appendChild(mk("hr",{cls:"sep"}));

  const noteLbl=Lbl("הערות");
  const noteTa=mk("textarea",{placeholder:"הערות חופשיות..."});
  noteTa.value=d.notes||"";noteTa.oninput=ev=>{d.notes=ev.target.value;};
  wrap.appendChild(D("",[noteLbl,noteTa]));
  wrap.appendChild(mk("hr",{cls:"sep"}));

  // מסמכים - העלאה ישירה
  wrap.appendChild(mk("p",{style:"font-size:13px;font-weight:600;margin-bottom:6px",txt:"📎 הסכם שכירות / תמונות"}));
  const docList=D("",{style:"margin-bottom:8px"});
  function refreshDocs(){
    docList.innerHTML="";
    d.docs.forEach((doc,i)=>{
      const row=D("doc");
      const isImg = doc.type && doc.type.startsWith("image/");
      if(isImg){
        row.appendChild(mk("img",{src:doc.url,style:"max-height:50px;border-radius:4px;margin-left:8px;vertical-align:middle"}));
      }
      row.appendChild(mk("a",{cls:"dl",href:doc.url,target:"_blank",txt:(isImg?"🖼 ":"📄 ")+doc.name}));
      row.appendChild(Btn("red sm","✕",()=>{d.docs.splice(i,1);refreshDocs();}));
      docList.appendChild(row);
    });
  }
  refreshDocs();
  wrap.appendChild(docList);

  const progressDiv=mk("p",{cls:"muted",style:"margin-bottom:8px",txt:""});
  wrap.appendChild(progressDiv);

  const fileInp=mk("input",{type:"file",accept:"image/*,.pdf,.doc,.docx"});
  fileInp.style.display="none";
  fileInp.onchange=async ev=>{
    const file=ev.target.files[0];if(!file)return;
    if(file.size>10*1024*1024)return alert("הקובץ גדול מדי — מקסימום 10MB");
    progressDiv.textContent="⏳ מעלה... 0%";
    try{
      const result = await uploadToCloudinary(file, pct=>{progressDiv.textContent="⏳ מעלה... "+pct+"%";});
      d.docs.push({id:uid(), name:result.name, url:result.url, type:result.type});
      progressDiv.textContent="✅ הועלה בהצלחה!";
      setTimeout(()=>{progressDiv.textContent="";},2000);
      refreshDocs();
    }catch(e){
      progressDiv.textContent="❌ שגיאה: "+e.message;
    }
    fileInp.value="";
  };
  wrap.appendChild(fileInp);
  const uploadRow=D("row");
  uploadRow.appendChild(Btn("gray","📁 בחר קובץ",()=>fileInp.click()));
  const camInp=mk("input",{type:"file",accept:"image/*",capture:"environment"});
  camInp.style.display="none";
  camInp.onchange=async ev=>{
    const file=ev.target.files[0];if(!file)return;
    progressDiv.textContent="⏳ מעלה תמונה...";
    try{
      const result = await uploadToCloudinary(file, pct=>{progressDiv.textContent="⏳ מעלה... "+pct+"%";});
      d.docs.push({id:uid(), name:result.name, url:result.url, type:result.type});
      progressDiv.textContent="✅ הועלה בהצלחה!";
      setTimeout(()=>{progressDiv.textContent="";},2000);
      refreshDocs();
    }catch(e){
      progressDiv.textContent="❌ שגיאה: "+e.message;
    }
    camInp.value="";
  };
  wrap.appendChild(camInp);
  uploadRow.appendChild(Btn("gray","📷 צלם תמונה",()=>camInp.click()));
  wrap.appendChild(uploadRow);

  wrap.appendChild(mk("hr",{cls:"sep"}));
  const brow=D("row");
  brow.appendChild(Btn("green","✅ שמור דייר",()=>{
    if(!d.name||!d.startDate||!d.rent)return alert("חובה: שם, תאריך כניסה, שכ\"ד");
    onSave({...d,id:d.id||uid(),status:d.status||"active",
            rent:Number(d.rent)||0,vaad:Number(d.vaad)||0,deposit:Number(d.deposit)||0});
  }));
  brow.appendChild(Btn("gray","ביטול",closeModal));
  wrap.appendChild(brow);
  return wrap;
}

  wrap.appendChild(D("alert-y",["הדייר יעבור לארכיון. כל הנתונים יישמרו במערכת."]));

  g.appendChild(Col("תאריך יציאה בפועל",Inp("date",endDate,v=>{endDate=v;})));

  wrap.appendChild(g);
  const nc=D("");nc.appendChild(Lbl("הערת סיום"));nc.appendChild(Ta(note,v=>{note=v;},"פגמים, חובות, הערות..."));

  return wrap;
}

function updAsset(id,fn){
  set({apts:S.apts.map(a=>a.id===id?fn(a):a)});
}

// ── Asset Manager ──
function renderAssets(){
  const assets=S.apts;
  const ff=S.fFloor;
  const filtered=assets.filter(a=>ff==="all"||a.floor===Number(ff));
  const wrap=D("");

  // פילטרים
  const fr=D("row");fr.style.marginBottom="12px";

  ab.style.marginRight="auto";fr.appendChild(ab);
  wrap.appendChild(fr);

  // טופס הוספה
  if(S.showAdd){
    const fp=D("fpanel");
    fp.appendChild(mk("p",{style:"font-size:14px;font-weight:700;margin-bottom:12px"},["דירה חדשה"]));
    const na={number:"",floor:"",area:"",balcony:"",sukkah:"",rent:"",note:"",docs:[]};
    const g=D("grid g3");
    const numInp=Inp("text","","","מס' דירה");numInp.oninput=ev=>{na.number=ev.target.value;};
    g.appendChild(Col("מס' דירה",numInp));
    const floorSel=Sel([["","בחר"],...APT_FLOORS.map(f=>[f,fmtFloor(f)])], "",v=>{na.floor=v;});
    g.appendChild(Col("קומה",floorSel));
    const areaSel=Sel([["","בחר שטח"],["38","38 מ\"ר"],["62.5","62.5 מ\"ר"],["64.3","64.3 מ\"ר"],["86","86 מ\"ר"],["94","94 מ\"ר"]],"",v=>{na.area=v;});
    g.appendChild(Col('שטח דירה מ"ר',areaSel));
    const balcInp=Inp("number","","","שטח כולל מ\"ר");balcInp.oninput=ev=>{na.balcony=ev.target.value;};
    g.appendChild(Col('מרפסת כולל מ"ר',balcInp));
    const sukkahInp=Inp("number","","","0 אם אין");sukkahInp.oninput=ev=>{na.sukkah=ev.target.value;};
    g.appendChild(Col('מרפסת סוכה מ"ר',sukkahInp));
    const rentInp=Inp("number","","","₪ לחודש");rentInp.oninput=ev=>{na.rent=ev.target.value;};
    g.appendChild(Col('שכר דירה ₪',rentInp));
    const noteInp=Inp("text","","","לדוג' דירת גן");noteInp.oninput=ev=>{na.note=ev.target.value;};
    g.appendChild(Col("הערה",noteInp));
    fp.appendChild(g);

    // העלאת קבצים
    fp.appendChild(mk("hr",{cls:"sep"}));
    fp.appendChild(mk("p",{style:"font-size:13px;font-weight:600;margin-bottom:6px",txt:"📎 הסכם שכירות / תמונות"}));
    const docList2=D("",{style:"margin-bottom:6px"});
    function refreshDocs2(){
      docList2.innerHTML="";
      na.docs.forEach((doc,i)=>{
        const row=D("doc");
        const isImg=doc.type&&doc.type.startsWith("image/");
        if(isImg) row.appendChild(mk("img",{src:doc.url,style:"max-height:40px;border-radius:4px;margin-left:8px;vertical-align:middle"}));
        row.appendChild(mk("a",{cls:"dl",href:doc.url,target:"_blank",txt:(isImg?"🖼 ":"📄 ")+doc.name}));
        row.appendChild(Btn("red sm","✕",()=>{na.docs.splice(i,1);refreshDocs2();}));
        docList2.appendChild(row);
      });
    }
    fp.appendChild(docList2);
    const prog2=mk("p",{cls:"muted",style:"margin-bottom:6px",txt:""});
    fp.appendChild(prog2);
    async function handleUpload2(file){
      if(!file)return;
      if(file.size>10*1024*1024)return alert("מקסימום 10MB");
      prog2.textContent="⏳ מעלה... 0%";
      try{
        const r=await uploadToCloudinary(file,p=>{prog2.textContent="⏳ מעלה... "+p+"%";});
        na.docs.push({id:uid(),name:r.name,url:r.url,type:r.type});
        prog2.textContent="✅ הועלה!";setTimeout(()=>{prog2.textContent="";},2000);
        refreshDocs2();
      }catch(e){prog2.textContent="❌ "+e.message;}
    }
    const fi2=mk("input",{type:"file",accept:"image/*,.pdf,.doc,.docx"});fi2.style.display="none";
    fi2.onchange=ev=>{handleUpload2(ev.target.files[0]);fi2.value="";};
    const ci2=mk("input",{type:"file",accept:"image/*",capture:"environment"});ci2.style.display="none";
    ci2.onchange=ev=>{handleUpload2(ev.target.files[0]);ci2.value="";};
    fp.appendChild(fi2);fp.appendChild(ci2);
    const ur2=D("row");
    ur2.appendChild(Btn("gray","📁 בחר קובץ",()=>fi2.click()));
    ur2.appendChild(Btn("gray","📷 צלם תמונה",()=>ci2.click()));
    fp.appendChild(ur2);
    fp.appendChild(mk("hr",{cls:"sep"}));
    const brow=D("row");
    brow.appendChild(Btn("blue","שמור",()=>{
      if(!na.number||na.floor===""||!na.area)return alert("חובה: מספר, קומה, שטח");
      const item={id:uid(),number:na.number,floor:Number(na.floor),area:Number(na.area),
                  balcony:Number(na.balcony||0),sukkah:Number(na.sukkah||0),
                  rent:Number(na.rent||0),note:na.note||"",docs:[...na.docs],tenants:[],added:true};
      set({apts:[...S.apts,item],showAdd:null});
    }));
    brow.appendChild(Btn("gray","ביטול",()=>set({showAdd:null},false)));
    fp.appendChild(brow);
    wrap.appendChild(fp);
  }

  if(filtered.length===0){wrap.appendChild(D("empty",["אין דירות. לחץ '+ הוסף דירה' להתחלה."]));return wrap;}

  filtered.forEach(asset=>{
    const at=getActive(asset);
    const isSel=S.sel===asset.id;
    const card=D("card"+(isSel?" sel":""));
    card.onclick=()=>set({sel:isSel?null:asset.id,showAdd:null},false);

    // כותרת כרטיס
    const nb=mk("div",{style:"min-width:46px;height:46px;border-radius:8px;background:#e8edf5;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#1e3a5f;padding:0 6px",txt:asset.number});
    const info=D("");info.style.flex="1";info.style.minWidth="0";
    const top=mk("div",{style:"display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:5px"});
    top.appendChild(mk("span",{style:"font-weight:700;font-size:15px;color:#1e3a5f",txt:"דירה "+asset.number}));
    top.appendChild(Bdg("bgr",fmtFloor(asset.floor)));
    top.appendChild(Bdg("bgr",asset.area+' מ"ר'));
    if(Number(asset.balcony)>0)top.appendChild(Bdg("bgr","מרפסת "+asset.balcony+' מ"ר'));
    if(Number(asset.sukkah)>0)top.appendChild(Bdg("bgr","סוכה "+asset.sukkah+' מ"ר'));
    if(asset.note)top.appendChild(Bdg("bo",asset.note));
    if(asset.rent&&Number(asset.rent)>0)top.appendChild(Bdg("bb","₪"+Number(asset.rent).toLocaleString()));
    top.appendChild(at?Bdg("bg","מושכר"):Bdg("by","פנוי"));
    info.appendChild(top);
    const sub=mk("div",{cls:"muted"});
    sub.textContent=at
      ?(at.name+(at.phone?" · "+at.phone:"")+" · ₪"+Number(at.rent).toLocaleString()+" · כניסה: "+fmtDate(at.startDate))
      :"אין דייר פעיל · "+((asset.tenants||[]).length)+" דיירים בהיסטוריה";
    info.appendChild(sub);
    const head=mk("div",{style:"display:flex;align-items:center;gap:10px"});
    head.appendChild(nb);head.appendChild(info);
    // מחיקה לכל הדירות
    head.appendChild(Btn("red sm","🗑 מחק",e=>{
      e.stopPropagation();
      openConfirm(`⚠️ למחוק דירה ${asset.number} לצמיתות?\nכל הדיירים וההיסטוריה יימחקו.`,()=>{
        set({apts:S.apts.filter(a=>a.id!==asset.id),sel:null});
      });
    }));
    card.appendChild(head);

    // פרטים מורחבים
    if(isSel){
      const det=mk("div",{style:"border-top:1px solid #e5e7eb;margin-top:12px;padding-top:12px"});
      det.onclick=e=>e.stopPropagation();
      det.appendChild(Btn("green","+ הוסף דייר חדש",()=>{
        openModal(tenantForm({},"➕ דייר חדש — דירה "+asset.number,newT=>{
          const curr=(asset.tenants||[]).map(t=>t.status==="active"?{...t,status:"archived"}:t);
          updAsset(asset.id,a=>({...a,tenants:[...curr,newT]}));
          closeModal();
        }));
      }));

      // מסמכי הדירה
      if((asset.docs||[]).length>0){
        det.appendChild(mk("p",{style:"font-size:12px;font-weight:600;margin:10px 0 5px",txt:"📎 מסמכי הדירה"}));
        (asset.docs||[]).forEach(doc=>{
          const row=D("doc");
          row.appendChild(mk("a",{cls:"dl",href:doc.url,target:"_blank",txt:"📄 "+doc.name}));
          row.appendChild(mk("span",{cls:"muted",txt:" ↗"}));
          det.appendChild(row);
        });
        det.appendChild(mk("hr",{cls:"sep"}));
      }

      const tenants=[...(asset.tenants||[])].sort((a,b)=>{
        if(a.status==="active")return -1;if(b.status==="active")return 1;
        return (b.startDate||"").localeCompare(a.startDate||"");
      });
      if(tenants.length===0) det.appendChild(D("empty",["אין דיירים — לחץ '+ הוסף דייר חדש'"]));

      tenants.forEach(t=>{
        const isAct=t.status==="active";
        const key=asset.id+"_"+t.id;
        const isOpen=!!S.expanded[key];
        const tc=D("tc"+(isAct?" act":""));
        const th=D("th");
        th.onclick=()=>{const ex={...S.expanded};ex[key]=!ex[key];set({expanded:ex},false);};
        const tl=mk("div",{style:"display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex:1;min-width:0"});
        tl.appendChild(mk("span",{style:"font-weight:700",txt:t.name||"ללא שם"}));
        tl.appendChild(isAct?Bdg("bg","פעיל"):Bdg("bgr","ארכיון"));
        if(t.startDate) tl.appendChild(mk("span",{cls:"muted",txt:fmtDate(t.startDate)+(t.endDate?" — "+fmtDate(t.endDate):"") }));
        const tr2=mk("div",{style:"display:flex;align-items:center;gap:8px;flex-shrink:0"});
        if(t.rent) tr2.appendChild(mk("span",{style:"font-weight:700;color:#1e3a5f",txt:"₪"+Number(t.rent).toLocaleString()}));
        tr2.appendChild(mk("span",{style:"color:#999",txt:isOpen?"▲":"▼"}));
        th.appendChild(tl);th.appendChild(tr2);tc.appendChild(th);

        const tb=D("tb"+(isOpen?" open":""));
        const ig=D("grid g3");ig.style.marginBottom="10px";
        [["טלפון",t.phone||"—"],["אימייל",t.email||"—"],["תעודת זהות",t.idNum||"—"],
         ["פיקדון","₪"+Number(t.deposit||0).toLocaleString()],
         ['שכ"ד',"₪"+Number(t.rent||0).toLocaleString()],
         ["ועד","₪"+Number(t.vaad||0).toLocaleString()],
         ["כניסה",fmtDate(t.startDate)],["יציאה",t.endDate?fmtDate(t.endDate):"—"],
         ["משך",t.startDate?monthsBetween(t.startDate,t.endDate||today())+" חודשים":"—"]
        ].forEach(([l,v])=>{
          const c=D("ic");c.innerHTML="<div class='cl'>"+l+"</div><div class='cv'>"+v+"</div>";ig.appendChild(c);
        });
        tb.appendChild(ig);
        if(t.notes) tb.appendChild(mk("div",{style:"background:#f8f9fa;border-radius:6px;padding:8px;font-size:12px;margin-bottom:8px"},["📝 "+t.notes]));
        if(t.note) tb.appendChild(mk("div",{style:"background:#fff7ed;border-radius:6px;padding:8px;font-size:12px;margin-bottom:8px;color:#92400e"},["🔒 הערת סיום: "+t.note+(t.refund?" · פיקדון הוחזר":"")]));
        if((t.docs||[]).length>0){
          tb.appendChild(mk("p",{style:"font-size:12px;font-weight:600;margin-bottom:5px"},["📎 מסמכים"]));
          (t.docs||[]).forEach(doc=>{
            const row=D("doc");
            row.appendChild(mk("a",{cls:"dl",href:doc.url,target:"_blank",txt:"📄 "+doc.name}));
            row.appendChild(mk("span",{cls:"muted",txt:" ↗"}));
            tb.appendChild(row);
          });
        }
        const ab=D("actions");
        ab.appendChild(Btn("gray sm","✏️ ערוך",()=>{
          openModal(tenantForm(t,"✏️ עריכת דייר — "+t.name,updated=>{
            updAsset(asset.id,a=>({...a,tenants:a.tenants.map(x=>x.id===t.id?updated:x)}));
            closeModal();
          }));
        }));
        if(isAct) ab.appendChild(Btn("orange sm","🔒 סגור חשבון",()=>{
          openModal(closeAccForm(t,data=>{
            updAsset(asset.id,a=>({...a,tenants:a.tenants.map(x=>x.id===t.id
              ?{...t,status:"archived",endDate:data.endDate,note:data.note,refund:data.refund}:x)}));
            closeModal();
          }));
        }));
        ab.appendChild(Btn("red sm","🗑 מחק דייר",()=>{
          openConfirm(`⚠️ למחוק את הדייר ${t.name} לצמיתות?\nהנתונים לא יינתנו לשחזור.`,()=>{
            updAsset(asset.id,a=>({...a,tenants:a.tenants.filter(x=>x.id!==t.id)}));
          });
        }));
        tb.appendChild(ab);tc.appendChild(tb);det.appendChild(tc);
      });
      card.appendChild(det);
    }
    wrap.appendChild(card);
  });
  return wrap;
}

  fr.appendChild(Col("עד תאריך",Inp("date",S.repTo,v=>set({repTo:v},false))));

  const aA=S.apts.filter(a=>getActive(a)).length;
  const aO=S.apts.length?Math.round(S.apts.reduce((s,a)=>s+calcOcc(a,S.repFrom,S.repTo),0)/S.apts.length):0;
  const aI=S.apts.reduce((s,a)=>{const t=getActive(a);return s+(t?Number(t.rent||0)+Number(t.vaad||0):0);},0);
  const mg=D("mg");
  [[aA+"/"+S.apts.length,"דירות מושכרות"],
   [aO+"%","תפוסה ממוצעת"],

  wrap.appendChild(mg);
  wrap.appendChild(mk("p",{style:"font-weight:700;font-size:14px;margin-bottom:8px"},["דירות"]));
  const ow=D("ov"),tbl=document.createElement("table");
  const heads=["דירה","קומה","שטח","מרפסת","סוכה","הערה","דייר פעיל","כניסה","יציאה",'שכ"ד',"תפוסה","היסטוריה"];
  tbl.innerHTML="<thead><tr>"+heads.map(h=>"<th>"+h+"</th>").join("")+"</tr></thead>";
  const tb=document.createElement("tbody");
  S.apts.forEach(a=>{
    const at=getActive(a),occ=calcOcc(a,S.repFrom,S.repTo);
    const oc=occ>=80?"#16a34a":occ>=50?"#d97706":"#dc2626";
    const tr=document.createElement("tr");
    tr.innerHTML=["<b>"+a.number+"</b>",fmtFloor(a.floor),a.area+' מ"ר',
      Number(a.balcony)>0?a.balcony+' מ"ר':"—",
      Number(a.sukkah)>0?a.sukkah+' מ"ר':"—",
      a.note||"—",
      at?at.name:"<span style='color:#aaa'>פנוי</span>",
      at?fmtDate(at.startDate):"—",at?(at.endDate?fmtDate(at.endDate):"פעיל"):"—",
      at?"₪"+Number(at.rent).toLocaleString():"—",
      "<span style='color:"+oc+";font-weight:700'>"+occ+"%</span>",
      (a.tenants||[]).length+" דיירים"
    ].map(c=>"<td>"+c+"</td>").join("");
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);ow.appendChild(tbl);wrap.appendChild(ow);
  return wrap;
}

// ── השוואה ──
function renderCompare(){
  const wrap=D("");
  const areas=[...new Set(S.apts.map(a=>a.area))].sort((a,b)=>a-b);
  const fr=D("row");fr.style.marginBottom="16px";
  fr.appendChild(Col("שטח",Sel([["all","כל הגדלים"],...areas.map(a=>[a,a+' מ"ר'])],S.cmpArea,v=>set({cmpArea:v},false))));
  wrap.appendChild(fr);
  const assets=S.cmpArea==="all"?S.apts:S.apts.filter(a=>a.area===Number(S.cmpArea));
  const active=assets.filter(a=>getActive(a));
  if(active.length>0){
    const n=active.length||1;
    const ab=mk("div",{style:"background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:14px"});
    ab.appendChild(mk("p",{style:"font-weight:700;margin-bottom:10px"},["ממוצעים"+(S.cmpArea!=="all"?" — "+S.cmpArea+' מ"ר':"")]));
    const mg=D("mg");
    [["₪"+Math.round(active.reduce((s,a)=>s+Number(getActive(a).rent||0),0)/n).toLocaleString(),'שכ"ד ממוצע'],
     ["₪"+(active.reduce((s,a)=>s+Number(getActive(a).rent||0)/a.area,0)/n).toFixed(0),'₪/מ"ר ממוצע'],
     [Math.round(assets.reduce((s,a)=>s+calcOcc(a,S.repFrom,S.repTo),0)/(assets.length||1))+"%","תפוסה ממוצעת"]
    ].forEach(([v,l])=>{const m=D("met");m.innerHTML="<div class='v' style='font-size:17px'>"+v+"</div><div class='l'>"+l+"</div>";mg.appendChild(m);});
    ab.appendChild(mg);wrap.appendChild(ab);
  }
  const cg=mk("div",{style:"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px"});
  if(assets.length===0)cg.appendChild(D("empty",["אין דירות להשוות"]));
  assets.forEach(a=>{
    const at=getActive(a),occ=calcOcc(a,S.repFrom,S.repTo);
    const cc=D("card");
    const ch=mk("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"});
    ch.appendChild(mk("span",{style:"font-weight:700;font-size:15px;color:#1e3a5f"},["דירה "+a.number]));
    ch.appendChild(at?Bdg("bg","מושכר"):Bdg("by","פנוי"));
    cc.appendChild(ch);
    if(at) cc.appendChild(mk("p",{cls:"muted",style:"margin-bottom:8px"},[ at.name]));
    const rg=mk("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:5px"});
    [["קומה",fmtFloor(a.floor)],["שטח",a.area+' מ"ר'],
     ...(Number(a.balcony)>0?[["מרפסת",a.balcony+' מ"ר']]:[]),
     ...(Number(a.sukkah)>0?[["סוכה",a.sukkah+' מ"ר']]:[]),
     ...(a.note?[["הערה",a.note]]:[]),
     ['שכ"ד',at?"₪"+Number(at.rent).toLocaleString():"פנוי"],
     ['₪/מ"ר',at?"₪"+(Number(at.rent)/a.area).toFixed(0):"—"],
     ["תפוסה",occ+"%"],["דיירים",(a.tenants||[]).length]
    ].forEach(([l,v])=>{
      const c=D("ic");c.innerHTML="<div class='cl'>"+l+"</div><div class='cv'>"+v+"</div>";rg.appendChild(c);
    });
    cc.appendChild(rg);cg.appendChild(cc);
  });
  wrap.appendChild(cg);return wrap;
}

// ── Render ──
function render(){
  const tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML="";
  TABS.forEach(t=>{
    tabsEl.appendChild(Btn("tab"+(S.tab===t?" on":""),t,()=>set({tab:t,showAdd:null,sel:null},false)));
  });
  const app=document.getElementById("app");app.innerHTML="";
  let c;
  if(S.tab==="דירות")c=renderAssets();
  else if(S.tab==="ניתוח")c=renderReport();
  else if(S.tab==="השוואה")c=renderCompare();
  else if(S.tab==="אבטחה"){
    const wrap=D("");
    wrap.appendChild(mk("p",{style:"font-weight:700;font-size:16px;margin-bottom:16px",txt:"🔒 הגדרות אבטחה"}));
    const card=D("card");
    card.appendChild(mk("p",{style:"font-weight:600;font-size:14px;margin-bottom:12px",txt:"שינוי סיסמה"}));
    const g=D("grid g2");
    const cur=mk("input",{type:"password",placeholder:"סיסמה נוכחית"});
    const n1=mk("input",{type:"password",placeholder:"סיסמה חדשה"});
    const n2=mk("input",{type:"password",placeholder:"אימות סיסמה חדשה"});
    g.appendChild(Col("סיסמה נוכחית",cur));
    g.appendChild(Col("סיסמה חדשה",n1));
    g.appendChild(Col("אימות סיסמה חדשה",n2));
    card.appendChild(g);
    const msg=mk("p",{style:"font-size:13px;margin:8px 0;min-height:18px",txt:""});
    card.appendChild(msg);
    card.appendChild(Btn("blue","שמור סיסמה חדשה",async ()=>{
      if(!(await checkPassword(cur.value))){msg.style.color="#dc2626";msg.textContent="❌ הסיסמה הנוכחית שגויה";return;}
      if(!n1.value){msg.style.color="#dc2626";msg.textContent="❌ נא להזין סיסמה חדשה";return;}
      if(n1.value!==n2.value){msg.style.color="#dc2626";msg.textContent="❌ הסיסמאות החדשות לא תואמות";return;}
      localStorage.setItem(PWD_KEY,await hashPassword(n1.value));
      msg.style.color="#16a34a";msg.textContent="✅ הסיסמה שונתה בהצלחה!";
      cur.value="";n1.value="";n2.value="";
    }));
    wrap.appendChild(card);

    const card2=D("card");
    card2.style.marginTop="10px";
    card2.appendChild(mk("p",{style:"font-weight:600;font-size:14px;margin-bottom:8px",txt:"יציאה מהמערכת"}));
    card2.appendChild(mk("p",{cls:"muted",style:"margin-bottom:12px",txt:"לחץ לצאת ולנעול את המערכת"}));
    card2.appendChild(Btn("red","🔒 יציאה",()=>{
      sessionStorage.removeItem("auth");
      location.reload();
    }));
    wrap.appendChild(card2);
    c=wrap;
  }
  if(c)app.appendChild(c);
  const m=renderModal();if(m)app.appendChild(m);
}
async function initApp(){
  await loadRemoteState();
  if(!isLoggedIn()){ showLoginScreen(); } else { render(); }
}
initApp();
</script>
</body>
</html>
