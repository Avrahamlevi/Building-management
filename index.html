<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ניהול בניין</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;direction:rtl;padding:16px}
h1{font-size:22px;margin-bottom:4px}
.sub{color:#888;font-size:13px;margin-bottom:16px}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #ddd}
.tab{padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:14px;color:#666;margin-bottom:-2px}
.tab.on{border-bottom-color:#2563eb;color:#2563eb;font-weight:600}
.card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;margin-bottom:10px}
.card.sel{border-color:#2563eb}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.col{display:flex;flex-direction:column;gap:3px}
label{font-size:12px;color:#666}
input,select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit;width:100%}
input:focus,select:focus{outline:none;border-color:#2563eb}
.btn{padding:7px 16px;border-radius:6px;border:1px solid #ccc;background:#fff;font-size:13px;cursor:pointer;font-family:inherit}
.btn-blue{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-blue:hover{background:#1d4ed8}
.btn-red{color:#dc2626;border-color:#fca5a5}
.btn-red:hover{background:#fef2f2}
.btn-sm{padding:4px 10px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px}
.b-green{background:#dcfce7;color:#166534}
.b-yellow{background:#fef9c3;color:#854d0e}
.b-gray{background:#f3f4f6;color:#4b5563}
.b-blue{background:#dbeafe;color:#1e40af}
.b-red{background:#fee2e2;color:#991b1b}
.asset-head{display:flex;align-items:center;gap:10px}
.num-box{width:44px;height:44px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.info{flex:1;min-width:0}
.info-main{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:3px}
.info-sub{font-size:12px;color:#666}
.actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.detail{border-top:1px solid #eee;margin-top:12px;padding-top:12px}
.lease{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f9f9f9;border-radius:8px;margin-bottom:6px;font-size:13px;border-right:3px solid #ddd}
.lease.active{border-right-color:#16a34a}
.lease.exp{border-right-color:#d97706}
.lease-left{flex:1}
.lease-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:8px}
.form-box{background:#f5f5f5;border-radius:8px;padding:10px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.metric{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center}
.metric .v{font-size:22px;font-weight:700;margin:4px 0 2px}
.metric .l{font-size:11px;color:#888}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:6px 10px;text-align:right;color:#666;font-weight:600;border-bottom:2px solid #eee;font-size:12px}
td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
tr:nth-child(even) td{background:#fafafa}
.occ{display:flex;align-items:center;gap:5px}
.bar{width:40px;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.fill{height:100%;border-radius:3px}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.cmp-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px}
.cmp-rows{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.cmp-cell{background:#f5f5f5;border-radius:6px;padding:5px 8px}
.cmp-lbl{font-size:10px;color:#888}
.cmp-val{font-size:13px;font-weight:600}
.avg-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:14px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#f3f4f6;border-radius:12px;font-size:12px}
.empty{font-size:12px;color:#aaa;padding:6px 0}
.section-h{font-weight:600;font-size:14px;margin:0 0 10px}
.mb8{margin-bottom:8px}
.mb16{margin-bottom:16px}
</style>
</head>
<body>

<h1>🏢 מערכת ניהול בניין</h1>
<div id="sub" class="sub"></div>

<div class="tabs" id="tabs"></div>
<div id="app"></div>

<script>
// ── נתונים ── ערוך כאן את הדירות והמחסנים שלך
const APTS = [
  // דוגמה — מחק ומלא נתונים אמיתיים
  // { id:"a1", number:"101", floor:1, area:65, balcony:8, leases:[], customFields:{} },
];

const STORAGES = [
  // דוגמה — מחק ומלא נתונים אמיתיים
  // { id:"s1", number:"מ-1", linkedApt:"101", floor:-1, area:6, leases:[], customFields:{} },
];

// ── קומות ──
const APT_FLOORS = [0,1,2,3,4,5,6,7];
const STOR_FLOORS = [-1,-2];
const fmtFloor = f => f===0?"קומת קרקע":f<0?`קומה מינוס ${Math.abs(f)}`:`קומה ${f}`;

// ── utils ──
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d?new Date(d).toLocaleDateString("he-IL"):"—";
const daysBetween = (a,b) => Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));
const monthsBetween = (a,b) => { const d1=new Date(a),d2=new Date(b); return Math.max(0,(d2.getFullYear()-d1.getFullYear())*12+d2.getMonth()-d1.getMonth()); };
const calcOcc = (asset,from,to) => {
  const tot=daysBetween(from,to); if(!tot) return 0;
  let occ=0;
  for(const l of asset.leases){ const s=l.start>from?l.start:from,e=l.end<to?l.end:to; if(s<e)occ+=daysBetween(s,e); }
  return Math.min(100,Math.round(occ/tot*100));
};
const getActive = (asset,d) => asset.leases.find(l=>l.start<=d&&l.end>=d)||null;
const totalMonths = a => a.leases.reduce((s,l)=>s+monthsBetween(l.start,l.end),0);
const uid = () => Date.now()+Math.random().toString(36).slice(2);

// ── State ──
let state = {
  tab: "דירות",
  apts: APTS,
  storages: STORAGES,
  selectedId: null,
  showAdd: false,
  showAddLease: null,
  editLease: null,
  filterArea: { apt:"all", stor:"all" },
  filterFloor: { apt:"all", stor:"all" },
  newAsset: { number:"",floor:"",area:"",balcony:"",linkedApt:"" },
  newLease: { tenant:"",start:"",end:"",rent:"",vaad:"",notes:"" },
  editLeaseData: null,
  reportFrom: new Date().getFullYear()+"-01-01",
  reportTo: new Date().getFullYear()+"-12-31",
  compareType: "apt",
  compareArea: "all",
};

const TABS = ["דירות","מחסנים","ניתוח ודוחות","השוואה"];

function setState(patch) { Object.assign(state,patch); render(); }

// ── HTML helpers ──
const h = (tag,attrs,inner) => {
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object"){ Object.assign(el.style,v); }
    else if(k.startsWith("on")){ el[k]=v; }
    else{ el.setAttribute(k,v); }
  }
  if(typeof inner==="string") el.innerHTML=inner;
  else if(Array.isArray(inner)) inner.forEach(c=>c&&el.appendChild(typeof c==="string"?Object.assign(document.createElement("span"),{textContent:c}):c));
  return el;
};
const div = (cls,inner) => { const el=document.createElement("div"); if(cls)el.className=cls; if(typeof inner==="string")el.innerHTML=inner; else if(Array.isArray(inner)) inner.forEach(c=>c&&el.appendChild(c)); return el; };
const span = (cls,text) => { const el=document.createElement("span"); el.className=cls||""; el.textContent=text; return el; };
const badge = (cls,text) => span(`badge ${cls}`,text);
const btn = (cls,text,onclick) => { const el=h("button",{class:`btn ${cls}`},text); el.onclick=onclick; return el; };
const lbl = text => { const el=document.createElement("label"); el.className="lbl"; el.textContent=text; return el; };
const inp = (type,val,onchange,style) => { const el=document.createElement("input"); el.type=type; el.value=val||""; el.onchange=e=>onchange(e.target.value); if(style)el.setAttribute("style",style); return el; };
const sel = (options,val,onchange,style) => {
  const el=document.createElement("select");
  if(style)el.setAttribute("style",style);
  options.forEach(([v,t])=>{ const o=document.createElement("option"); o.value=v; o.textContent=t; if(v==val)o.selected=true; el.appendChild(o); });
  el.onchange=e=>onchange(e.target.value);
  return el;
};
const colDiv = (labelText,child) => { const d=div("col"); d.appendChild(lbl(labelText)); d.appendChild(child); return d; };

// ── Badge helpers ──
function leaseStatusBadge(l,tod) {
  const isAct=l.start<=tod&&l.end>=tod;
  const exp=!isAct&&l.end>=tod&&daysBetween(tod,l.end)<=60;
  if(isAct) return badge("b-green","פעיל");
  if(exp) return badge("b-yellow","פג בקרוב");
  if(l.end<tod) return badge("b-gray","הסתיים");
  return badge("b-blue","עתידי");
}

// ── OccBar ──
function occBar(pct) {
  const color=pct>=80?"#16a34a":pct>=50?"#d97706":"#dc2626";
  const wrap=div("bar"); const fill=div("fill"); fill.style.width=pct+"%"; fill.style.background=color; wrap.appendChild(fill);
  const row=div("occ"); row.appendChild(wrap); row.appendChild(document.createTextNode(" "+pct+"%")); return row;
}

// ── Asset Manager ──
function renderAssetManager(assets,type) {
  const isApt=type==="apt";
  const typeLabel=isApt?"דירה":"מחסן";
  const floorOpts=isApt?APT_FLOORS:STOR_FLOORS;
  const tod=today();
  const fa=state.filterArea[type], ff=state.filterFloor[type];
  const areas=[...new Set(assets.map(a=>a.area))].sort((a,b)=>a-b);
  const filtered=assets.filter(a=>(fa==="all"||a.area===Number(fa))&&(ff==="all"||a.floor===Number(ff)));
  const aptNums=state.apts.map(a=>a.number);

  const wrap=div("");

  // Filter row
  const frow=div("row mb8");
  frow.appendChild(colDiv("שטח", sel([["all","הכל"],...areas.map(a=>[a,a+' מ"ר'])],fa,v=>setState({filterArea:{...state.filterArea,[type]:v}}),"")));
  frow.appendChild(colDiv("קומה", sel([["all","הכל"],...floorOpts.map(f=>[f,fmtFloor(f)])],ff,v=>setState({filterFloor:{...state.filterFloor,[type]:v}}),"min-width:140px")));
  const addBtn=btn("btn-blue","+ הוסף "+typeLabel,()=>setState({showAdd:!state.showAdd,selectedId:null}));
  addBtn.style.marginRight="auto";
  frow.appendChild(addBtn);
  wrap.appendChild(frow);

  // Add form
  if(state.showAdd) {
    const form=div("card mb16");
    form.style.borderColor="#93c5fd";
    const t=div("section-h"); t.textContent=typeLabel+" חדש"; form.appendChild(t);
    const grid=div("form-grid");
    const na=state.newAsset;
    grid.appendChild(colDiv("מס' "+typeLabel, inp("text",na.number,v=>setState({newAsset:{...state.newAsset,number:v}}))));
    grid.appendChild(colDiv("קומה", sel([["","בחר"],...floorOpts.map(f=>[f,fmtFloor(f)])],na.floor,v=>setState({newAsset:{...state.newAsset,floor:v}}))));
    grid.appendChild(colDiv('שטח מ"ר', inp("number",na.area,v=>setState({newAsset:{...state.newAsset,area:v}}))));
    if(isApt) grid.appendChild(colDiv('מרפסת מ"ר', inp("number",na.balcony,v=>setState({newAsset:{...state.newAsset,balcony:v}}))));
    if(!isApt) grid.appendChild(colDiv("קשור לדירה", sel([["","ללא"],...aptNums.map(n=>[n,"דירה "+n])],na.linkedApt,v=>setState({newAsset:{...state.newAsset,linkedApt:v}}))));
    form.appendChild(grid);
    const brow=div("row"); 
    brow.appendChild(btn("btn-blue","שמור",()=>{
      if(!state.newAsset.number||state.newAsset.floor===""||!state.newAsset.area) return alert("נא למלא מספר, קומה ושטח");
      const list=isApt?state.apts:state.storages;
      const newItem={id:uid(),number:state.newAsset.number,floor:Number(state.newAsset.floor),area:Number(state.newAsset.area),balcony:Number(state.newAsset.balcony||0),linkedApt:state.newAsset.linkedApt||"",leases:[],customFields:{}};
      if(isApt) setState({apts:[...state.apts,newItem],showAdd:false,newAsset:{number:"",floor:"",area:"",balcony:"",linkedApt:""}});
      else setState({storages:[...state.storages,newItem],showAdd:false,newAsset:{number:"",floor:"",area:"",balcony:"",linkedApt:""}});
    }));
    brow.appendChild(btn("","ביטול",()=>setState({showAdd:false})));
    form.appendChild(brow);
    wrap.appendChild(form);
  }

  // Asset list
  filtered.forEach(asset=>{
    const active=getActive(asset,tod);
    const occ=calcOcc(asset,state.reportFrom,state.reportTo);
    const isSel=state.selectedId===asset.id;
    const card=div("card asset-card"+(isSel?" sel":""));
    card.onclick=()=>setState({selectedId:isSel?null:asset.id,showAdd:false,showAddLease:null,editLease:null});

    // Header
    const head=div("asset-head");
    const numBox=div("num-box"); numBox.textContent=asset.number; head.appendChild(numBox);
    const info=div("info");
    const main=div("info-main");
    main.appendChild(span("",typeLabel+" "+asset.number));
    main.appendChild(badge("b-gray",fmtFloor(asset.floor)));
    main.appendChild(badge("b-gray",asset.area+' מ"ר'));
    if(isApt&&asset.balcony>0) main.appendChild(badge("b-gray","מרפסת "+asset.balcony+' מ"ר'));
    if(!isApt&&asset.linkedApt) main.appendChild(badge("b-gray","דירה "+asset.linkedApt));
    main.appendChild(active?badge("b-green","מושכר"):badge("b-yellow","פנוי"));
    info.appendChild(main);
    const sub=div("info-sub");
    sub.textContent=(active?active.tenant+" | ₪"+active.rent.toLocaleString()+(isApt&&active.vaad?" + ועד ₪"+active.vaad:""):"אין חוזה פעיל")+" · תפוסה: "+occ+"% · "+totalMonths(asset)+" חודשים";
    info.appendChild(sub);
    head.appendChild(info);
    const acts=div("actions");
    if(active) { const pm=span("","₪"+(active.rent/asset.area).toFixed(0)+'/מ"ר'); pm.style.fontSize="12px"; pm.style.color="#666"; acts.appendChild(pm); }
    acts.appendChild(btn("btn-red btn-sm","מחק",e=>{ e.stopPropagation(); if(confirm("למחוק "+typeLabel+" "+asset.number+"?")){ const nl=isApt?state.apts.filter(a=>a.id!==asset.id):state.storages.filter(a=>a.id!==asset.id); if(isApt)setState({apts:nl,selectedId:null}); else setState({storages:nl,selectedId:null}); }}));
    head.appendChild(acts);
    card.appendChild(head);

    // Expanded
    if(isSel) {
      const det=div("detail"); det.onclick=e=>e.stopPropagation();
      const lh=div("row mb8"); lh.style.justifyContent="space-between";
      const lt=span("section-h","חוזי שכירות ("+asset.leases.length+")"); lh.appendChild(lt);
      const alBtn=btn("","+ הוסף חוזה",()=>setState({showAddLease:state.showAddLease===asset.id?null:asset.id,newLease:{tenant:"",start:"",end:"",rent:"",vaad:"",notes:""}}));
      lh.appendChild(alBtn); det.appendChild(lh);

      if(state.showAddLease===asset.id) {
        const lf=div("form-box mb8");
        const lg=div("form-grid");
        const fields=[["שם שוכר","tenant","text"],["מתאריך","start","date"],["עד תאריך","end","date"],['שכ"ד ₪',"rent","number"],...(isApt?[["ועד בית ₪","vaad","number"]]:[]),["הערות","notes","text"]];
        fields.forEach(([l,k,t])=>{ const nl=state.newLease; lg.appendChild(colDiv(l, inp(t,nl[k],v=>setState({newLease:{...state.newLease,[k]:v}})))); });
        lf.appendChild(lg);
        const lb=div("row");
        lb.appendChild(btn("btn-blue","שמור חוזה",()=>{
          const nl=state.newLease;
          if(!nl.tenant||!nl.start||!nl.end||!nl.rent) return alert("נא למלא שם, תאריכים וסכום");
          const lease={...nl,rent:Number(nl.rent),vaad:Number(nl.vaad||0)};
          const updated=isApt?state.apts.map(a=>a.id===asset.id?{...a,leases:[...a.leases,lease]}:a):state.storages.map(a=>a.id===asset.id?{...a,leases:[...a.leases,lease]}:a);
          if(isApt)setState({apts:updated,showAddLease:null}); else setState({storages:updated,showAddLease:null});
        }));
        lb.appendChild(btn("","ביטול",()=>setState({showAddLease:null})));
        lf.appendChild(lb); det.appendChild(lf);
      }

      if(asset.leases.length===0) { const em=div("empty"); em.textContent="אין חוזים עדיין"; det.appendChild(em); }

      asset.leases.forEach((l,i)=>{
        const isAct=l.start<=tod&&l.end>=tod;
        const isExp=!isAct&&l.end>=tod&&daysBetween(tod,l.end)<=60;
        const editing=state.editLease&&state.editLease.assetId===asset.id&&state.editLease.idx===i;
        if(editing) {
          const ef=div("form-box mb8");
          const eg=div("form-grid");
          const fields=[["שם שוכר","tenant","text"],["מתאריך","start","date"],["עד תאריך","end","date"],['שכ"ד ₪',"rent","number"],...(isApt?[["ועד בית ₪","vaad","number"]]:[]),["הערות","notes","text"]];
          fields.forEach(([l2,k,t])=>{ const ed=state.editLease.data; eg.appendChild(colDiv(l2, inp(t,ed[k],v=>setState({editLease:{...state.editLease,data:{...state.editLease.data,[k]:v}}})))); });
          ef.appendChild(eg);
          const eb=div("row");
          eb.appendChild(btn("btn-blue","שמור שינויים",()=>{
            const d=state.editLease.data;
            const lease={...d,rent:Number(d.rent),vaad:Number(d.vaad||0)};
            const updated=isApt?state.apts.map(a=>a.id===asset.id?{...a,leases:a.leases.map((x,j)=>j===i?lease:x)}:a):state.storages.map(a=>a.id===asset.id?{...a,leases:a.leases.map((x,j)=>j===i?lease:x)}:a);
            if(isApt)setState({apts:updated,editLease:null}); else setState({storages:updated,editLease:null});
          }));
          eb.appendChild(btn("","ביטול",()=>setState({editLease:null})));
          ef.appendChild(eb); det.appendChild(ef);
        } else {
          const lr=div("lease"+(isAct?" active":isExp?" exp":""));
          const ll=div("lease-left");
          const lt2=div(""); lt2.style.display="flex"; lt2.style.gap="6px"; lt2.style.alignItems="center"; lt2.style.marginBottom="3px";
          lt2.appendChild(span("",l.tenant)); lt2.appendChild(leaseStatusBadge(l,tod)); ll.appendChild(lt2);
          const ls=div(""); ls.style.fontSize="11px"; ls.style.color="#666";
          ls.textContent=fmtDate(l.start)+" — "+fmtDate(l.end)+" · "+monthsBetween(l.start,l.end)+" חודשים"+(l.notes?" · "+l.notes:"");
          ll.appendChild(ls); lr.appendChild(ll);
          const lright=div("lease-right");
          const lprice=div(""); lprice.style.textAlign="left";
          lprice.innerHTML="<strong>₪"+l.rent.toLocaleString()+"</strong>/חודש";
          if(isApt&&l.vaad>0){ const lv=document.createElement("div"); lv.style.fontSize="11px"; lv.style.color="#666"; lv.textContent="ועד ₪"+l.vaad; lprice.appendChild(lv); }
          const lpm=document.createElement("div"); lpm.style.fontSize="11px"; lpm.style.color="#666"; lpm.textContent="₪"+(l.rent/asset.area).toFixed(0)+'/מ"ר'; lprice.appendChild(lpm);
          lright.appendChild(lprice);
          lright.appendChild(btn("btn-sm","✏️ ערוך",()=>setState({editLease:{assetId:asset.id,idx:i,data:{...l}}})));
          lright.appendChild(btn("btn-red btn-sm","מחק",()=>{ if(confirm("למחוק חוזה זה?")){ const updated=isApt?state.apts.map(a=>a.id===asset.id?{...a,leases:a.leases.filter((_,j)=>j!==i)}:a):state.storages.map(a=>a.id===asset.id?{...a,leases:a.leases.filter((_,j)=>j!==i)}:a); if(isApt)setState({apts:updated}); else setState({storages:updated}); }}));
          lr.appendChild(lright); det.appendChild(lr);
        }
      });
      card.appendChild(det);
    }
    wrap.appendChild(card);
  });

  if(filtered.length===0) { const em=div(""); em.style.color="#aaa"; em.style.padding="20px 0"; em.textContent="אין "+typeLabel+"ות. לחץ '+ הוסף "+typeLabel+"' כדי להתחיל."; wrap.appendChild(em); }
  return wrap;
}

// ── Report Tab ──
function renderReport() {
  const tod=today();
  const wrap=div("");
  const frow=div("row mb16");
  frow.appendChild(colDiv("מתאריך", inp("date",state.reportFrom,v=>setState({reportFrom:v}))));
  frow.appendChild(colDiv("עד תאריך", inp("date",state.reportTo,v=>setState({reportTo:v}))));
  wrap.appendChild(frow);

  const aptActive=state.apts.filter(a=>getActive(a,tod)).length;
  const storActive=state.storages.filter(a=>getActive(a,tod)).length;
  const aptOcc=state.apts.length?Math.round(state.apts.reduce((s,a)=>s+calcOcc(a,state.reportFrom,state.reportTo),0)/state.apts.length):0;
  const storOcc=state.storages.length?Math.round(state.storages.reduce((s,a)=>s+calcOcc(a,state.reportFrom,state.reportTo),0)/state.storages.length):0;
  const aptInc=state.apts.reduce((s,a)=>{const l=getActive(a,tod);return s+(l?l.rent+(l.vaad||0):0);},0);
  const storInc=state.storages.reduce((s,a)=>{const l=getActive(a,tod);return s+(l?l.rent:0);},0);

  const mg=div("metrics");
  [[aptActive+"/"+state.apts.length,"דירות מושכרות"],[storActive+"/"+state.storages.length,"מחסנים מושכרים"],[aptOcc+"%","תפוסה דירות"],[storOcc+"%","תפוסה מחסנים"],["₪"+aptInc.toLocaleString(),"הכנסה דירות"],["₪"+storInc.toLocaleString(),"הכנסה מחסנים"],["₪"+(aptInc+storInc).toLocaleString(),'סה"כ חודשי']].forEach(([v,l])=>{
    const m=div("metric"); m.innerHTML="<div class='v'>"+v+"</div><div class='l'>"+l+"</div>"; mg.appendChild(m);
  });
  wrap.appendChild(mg);

  [{assets:state.apts,label:"דירות",isApt:true},{assets:state.storages,label:"מחסנים",isApt:false}].forEach(({assets,label,isApt})=>{
    const sh=div("section-h mb8"); sh.textContent=label; wrap.appendChild(sh);
    const ow=div(""); ow.style.overflowX="auto"; ow.style.marginBottom="24px";
    const tbl=document.createElement("table");
    const heads=[isApt?"דירה":"מחסן","קומה",'שטח',isApt?"מרפסת":"דירה קשורה","תפוסה","חודשים",'שכ"ד',isApt?"ועד":"",`₪/מ"ר`].filter(Boolean);
    tbl.innerHTML="<thead><tr>"+heads.map(h=>"<th>"+h+"</th>").join("")+"</tr></thead>";
    const tb=document.createElement("tbody");
    assets.forEach(a=>{
      const active=getActive(a,tod); const occ=calcOcc(a,state.reportFrom,state.reportTo);
      const occColor=occ>=80?"#16a34a":occ>=50?"#d97706":"#dc2626";
      const tr=document.createElement("tr");
      const cells=[
        "<strong>"+a.number+"</strong>",
        fmtFloor(a.floor),
        a.area+' מ"ר',
        isApt?(a.balcony>0?a.balcony+' מ"ר':"—"):(a.linkedApt?"דירה "+a.linkedApt:"—"),
        "<span style='color:"+occColor+";font-weight:600'>"+occ+"%</span>",
        totalMonths(a),
        active?"₪"+active.rent.toLocaleString():"<span style='color:#aaa'>פנוי</span>",
        ...(isApt?[active?"₪"+active.vaad:"—"]:[]),
        active?"₪"+(active.rent/a.area).toFixed(0):"—"
      ];
      tr.innerHTML=cells.map(c=>"<td>"+c+"</td>").join("");
      tb.appendChild(tr);
    });
    tbl.appendChild(tb); ow.appendChild(tbl); wrap.appendChild(ow);
  });
  return wrap;
}

// ── Compare Tab ──
function renderCompare() {
  const tod=today();
  const wrap=div("");
  const frow=div("row mb16");
  frow.appendChild(colDiv("סוג נכס", sel([["apt","דירות"],["stor","מחסנים"]],state.compareType,v=>setState({compareType:v,compareArea:"all"}),"min-width:110px")));
  const src=state.compareType==="apt"?state.apts:state.storages;
  const areas=[...new Set(src.map(a=>a.area))].sort((a,b)=>a-b);
  frow.appendChild(colDiv("שטח", sel([["all","כל הגדלים"],...areas.map(a=>[a,a+' מ"ר'])],state.compareArea,v=>setState({compareArea:v}),"min-width:130px")));
  wrap.appendChild(frow);

  const assets=state.compareArea==="all"?src:src.filter(a=>a.area===Number(state.compareArea));
  const isApt=state.compareType==="apt";
  const activeAssets=assets.filter(a=>getActive(a,tod));

  if(activeAssets.length>0) {
    const ab=div("avg-box mb8");
    const at=div("section-h mb8"); at.textContent="ממוצעים — "+(isApt?"דירות":"מחסנים")+(state.compareArea!=="all"?" "+state.compareArea+' מ"ר':""); ab.appendChild(at);
    const amg=div("metrics");
    const n=activeAssets.length||1;
    [
      ["₪"+Math.round(activeAssets.reduce((s,a)=>s+getActive(a,tod).rent,0)/n).toLocaleString(),'שכ"ד ממוצע'],
      ["₪"+(activeAssets.reduce((s,a)=>s+getActive(a,tod).rent/a.area,0)/n).toFixed(0),'₪/מ"ר ממוצע'],
      [Math.round(assets.reduce((s,a)=>s+calcOcc(a,state.reportFrom,state.reportTo),0)/(assets.length||1))+"%","תפוסה ממוצעת"],
    ].forEach(([v,l])=>{ const m=div("metric"); m.innerHTML="<div class='v' style='font-size:18px'>"+v+"</div><div class='l'>"+l+"</div>"; amg.appendChild(m); });
    ab.appendChild(amg); wrap.appendChild(ab);
  }

  const cg=div("cmp-grid");
  assets.forEach(a=>{
    const active=getActive(a,tod); const occ=calcOcc(a,state.reportFrom,state.reportTo);
    const cc=div("cmp-card");
    const ch=div(""); ch.style.display="flex"; ch.style.justifyContent="space-between"; ch.style.marginBottom="6px";
    ch.appendChild(span("",""+(isApt?"דירה":"מחסן")+" "+a.number)); ch.style.fontWeight="600";
    ch.appendChild(active?badge("b-green","מושכר"):badge("b-yellow","פנוי"));
    cc.appendChild(ch);
    if(active){const nt=div(""); nt.style.fontSize="12px"; nt.style.color="#666"; nt.style.marginBottom="8px"; nt.textContent=active.tenant; cc.appendChild(nt);}
    const rows=[
      ["קומה",fmtFloor(a.floor)],["שטח",a.area+' מ"ר'],
      ...(isApt&&a.balcony>0?[["מרפסת",a.balcony+' מ"ר']]:[]),
      ...(!isApt&&a.linkedApt?[["דירה קשורה",a.linkedApt]]:[]),
      ['שכ"ד',active?"₪"+active.rent.toLocaleString():"פנוי"],
      ['₪/מ"ר',active?"₪"+(active.rent/a.area).toFixed(0):"—"],
      ...(isApt&&active&&active.vaad?[["ועד","₪"+active.vaad]]:[]),
      ["תפוסה",occ+"%"],["חוזים",a.leases.length],["חודשים מושכר",totalMonths(a)],
    ];
    const rg=div("cmp-rows");
    rows.forEach(([l,v])=>{ const rc=div("cmp-cell"); rc.innerHTML="<div class='cmp-lbl'>"+l+"</div><div class='cmp-val'>"+v+"</div>"; rg.appendChild(rc); });
    cc.appendChild(rg);
    if(active){const df=div(""); df.style.cssText="font-size:11px;color:#888;margin-top:8px;padding-top:8px;border-top:1px solid #eee"; df.textContent=fmtDate(active.start)+" — "+fmtDate(active.end)+" · "+monthsBetween(active.start,active.end)+" חודשים"; cc.appendChild(df);}
    cg.appendChild(cc);
  });
  if(assets.length===0){const em=div(""); em.style.color="#aaa"; em.textContent="אין נכסים להשוות"; cg.appendChild(em);}
  wrap.appendChild(cg);
  return wrap;
}

// ── Main Render ──
function render() {
  // subtitle
  document.getElementById("sub").textContent="נכון ל‑"+fmtDate(today());

  // tabs
  const tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML="";
  TABS.forEach(t=>{ const b=document.createElement("button"); b.className="tab"+(state.tab===t?" on":""); b.textContent=t; b.onclick=()=>setState({tab:t,showAdd:false,selectedId:null,showAddLease:null,editLease:null}); tabsEl.appendChild(b); });

  // content
  const app=document.getElementById("app");
  app.innerHTML="";
  if(state.tab==="דירות") app.appendChild(renderAssetManager(state.apts,"apt"));
  else if(state.tab==="מחסנים") app.appendChild(renderAssetManager(state.storages,"stor"));
  else if(state.tab==="ניתוח ודוחות") app.appendChild(renderReport());
  else if(state.tab==="השוואה") app.appendChild(renderCompare());
}

render();
</script>
